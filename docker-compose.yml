services:
  postgres:
    image: postgres:16-alpine
    platform: ${POSTGRES_PLATFORM:-linux/amd64}
    container_name: dep_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    platform: ${MINIO_PLATFORM:-linux/amd64}
    container_name: dep_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    platform: ${MINIO_PLATFORM:-linux/amd64}
    container_name: dep_minio_init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_OBJECT_STORAGE_BUCKET: ${APP_OBJECT_STORAGE_BUCKET:-dep-assets}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done &&
      mc mb --ignore-existing local/$$APP_OBJECT_STORAGE_BUCKET
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dep_backend
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql+psycopg://app:app@postgres:5432/app}
      APP_SECURITY_PEPPER: ${APP_SECURITY_PEPPER:-dev-pepper-change-in-prod}
      APP_ACCESS_TOKEN_SECRET: ${APP_ACCESS_TOKEN_SECRET:-dev-access-token-secret-change-in-prod}
      APP_ACCESS_TOKEN_TTL_MINUTES: ${APP_ACCESS_TOKEN_TTL_MINUTES:-30}
      APP_QR_TTL_HOURS: ${APP_QR_TTL_HOURS:-24}
      APP_REFRESH_SESSION_DAYS: ${APP_REFRESH_SESSION_DAYS:-30}
      APP_ADMIN_LOGIN: ${APP_ADMIN_LOGIN:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin12345}
      APP_OBJECT_STORAGE_ENDPOINT_URL: ${APP_OBJECT_STORAGE_ENDPOINT_URL:-http://minio:9000}
      APP_OBJECT_STORAGE_BUCKET: ${APP_OBJECT_STORAGE_BUCKET:-dep-assets}
      APP_OBJECT_STORAGE_ACCESS_KEY: ${APP_OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      APP_OBJECT_STORAGE_SECRET_KEY: ${APP_OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      APP_OBJECT_STORAGE_SECURE: ${APP_OBJECT_STORAGE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app

volumes:
  postgres_data:
  minio_data:
